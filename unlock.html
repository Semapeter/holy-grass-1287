<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音乐解锁 - 胡萝卜须儿</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      background: #0f172a;
    }
    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: rgba(15, 23, 42, 0.95);
      border-bottom: 1px solid rgba(148, 163, 184, 0.22);
    }
    .header h1 {
      color: #e2e8f0;
      font-size: 18px;
      font-weight: 600;
    }
    .header a {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #94a3b8;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    .header a:hover {
      color: #e2e8f0;
    }
    .iframe-container {
      flex: 1;
      position: relative;
    }
    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.9);
      gap: 16px;
      z-index: 10;
      transition: opacity 0.3s;
    }
    .loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(56, 189, 248, 0.3);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading span {
      color: #94a3b8;
      font-size: 14px;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>🎵 音乐解锁</h1>
      <a href="index">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        返回首页
      </a>
    </header>
    <div class="iframe-container">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <span>加载中...</span>
      </div>
      <iframe 
        src="http://unlock.music.hi.cn/" 
        title="音乐解锁"
        sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-presentation"
        onload="document.getElementById('loading').classList.add('hidden')"
      ></iframe>
    </div>
  </div>
</body>
</html>
