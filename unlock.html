<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音乐解锁 - 胡萝卜须儿</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #f1f5f9;
    }

    /* ── Background ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .bg-glow {
      position: absolute;
      left: 50%;
      top: -200px;
      width: 600px;
      height: 600px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168,85,247,0.08), transparent 65%);
      filter: blur(60px);
    }

    /* ── Layout ── */
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ── */
    .header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .header-inner {
      max-width: 768px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-back {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #94a3b8;
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
    }
    .header-back:hover { color: #e2e8f0; }

    .header-divider {
      width: 1px;
      height: 16px;
      background: rgba(255,255,255,0.15);
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 600;
      color: #f1f5f9;
    }

    .header-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: rgba(168,85,247,0.2);
      border: 1px solid rgba(168,85,247,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .header-badge {
      margin-left: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(168,85,247,0.15);
      border: 1px solid rgba(168,85,247,0.3);
      font-size: 11px;
      font-weight: 500;
      color: #c084fc;
    }

    /* ── Tip bar ── */
    .tip-bar {
      flex-shrink: 0;
      padding: 8px 24px;
      background: rgba(168,85,247,0.06);
      border-bottom: 1px solid rgba(168,85,247,0.12);
    }

    .tip-inner {
      max-width: 768px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #a78bfa;
    }
    .tip-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #a78bfa;
      flex-shrink: 0;
    }

    /* ── iframe area ── */
    .iframe-outer {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
    }

    .iframe-inner {
      max-width: 768px;
      margin: 0 auto;
      height: calc(100vh - 120px);
      min-height: 480px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(15,23,42,0.6);
      position: relative;
    }

    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(15,23,42,0.95);
      z-index: 10;
      border-radius: inherit;
      transition: opacity 0.4s ease;
    }
    .loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner-ring {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 3px solid rgba(168,85,247,0.2);
      border-top-color: #a855f7;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 13px;
      color: #64748b;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <!-- background -->
  <div class="bg">
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
  </div>

  <div class="container">
    <!-- header -->
    <header class="header">
      <div class="header-inner">
        <a href="index" class="header-back">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          返回
        </a>
        <div class="header-divider"></div>
        <div class="header-title">
          <div class="header-icon">🎵</div>
          音乐解锁
          <span class="header-badge">免费</span>
        </div>
      </div>
    </header>

    <!-- tip -->
    <div class="tip-bar">
      <div class="tip-inner">
        <div class="tip-dot"></div>
        拖入或选择加密音乐文件（.ncm / .qmc / .mflac 等），即可解锁为标准格式下载
      </div>
    </div>

    <!-- iframe -->
    <div class="iframe-outer">
      <div class="iframe-inner">
        <div class="loading" id="loading">
          <div class="spinner-ring"></div>
          <span class="loading-text">加载中…</span>
        </div>
        <iframe
          src="http://unlock.music.hi.cn/"
          title="音乐解锁"
          sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-presentation"
          onload="document.getElementById('loading').classList.add('hidden')"
        ></iframe>
      </div>
    </div>
  </div>
</body>
</html>
